services:
  postgres:
    ports:
      - "5432:5432"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  frontend:
    build:
      target: dev
    entrypoint: []
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5174:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend

  backend:
    build:
      target: dev
    entrypoint: []
    volumes:
      - ./backend:/app
    command: >
      sh -c "uv sync --group dev && uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload"
    ports:
      - "8080:8080"
    environment:
      - DEBUG=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-setss_user}:${POSTGRES_PASSWORD:-setss_dev_password}@postgres/${POSTGRES_DB:-setss_db}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key}
