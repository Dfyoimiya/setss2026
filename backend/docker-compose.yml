version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: setss_postgres
    environment:
      POSTGRES_USER: setss_user
      POSTGRES_PASSWORD: setss_password
      POSTGRES_DB: setss_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setss_user"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build: . 
    container_name: setss_backend
    ports:
      - "8000:8000" 
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: